# 工作流名称（在 GitHub Actions 页面显示）
name: Auto Render PlantUML & ZenUML (Mermaid)

# 触发条件：推送代码到 main 分支、提 PR 到 main 分支时执行
on:
  push:
    branches: [ main, master ]
    paths:
      - '**.md'  # 仅当 Markdown 文件修改时触发
  pull_request:
    branches: [ main, master ]
    paths:
      - '**.md'

# 定义任务
jobs:
  render-diagrams:
    # 运行环境：Ubuntu 最新版
    runs-on: ubuntu-latest
    # 设置权限（允许提交代码到仓库）
    permissions:
      contents: write
      pull-requests: write

    steps:
      # 步骤 1：拉取仓库代码到 Actions 服务器
      - name: Checkout Repository Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # 拉取完整历史，避免提交冲突

      # 步骤 2：安装 Java（PlantUML 必需）
      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # 步骤 3：渲染 PlantUML 为图片（替换为稳定的第三方 Action）
      - name: Render PlantUML Diagrams
        uses: mikefarah/yq@master  # 先安装依赖工具
        continue-on-error: true    # 非必需，容错用
      - name: Generate PlantUML Images
        run: |
          # 创建图片输出目录
          mkdir -p ./docs/images/plantuml
          # 下载 PlantUML 核心 jar 包
          wget https://github.com/plantuml/plantuml/releases/latest/download/plantuml.jar
          # 扫描所有 Markdown 文件中的 PlantUML 代码并生成图片
          find . -name "*.md" -type f | while read -r md_file; do
            # 提取 PlantUML 代码块并生成图片（按文件+序号命名）
            plantuml_count=1
            # 用 awk 提取 ```plantuml 和 ``` 之间的内容
            awk '/```plantuml/,/```/ {
              if (!/```/) print $0 > "temp_plantuml.puml"
              if (/```/ && plantuml_count > 1) {
                java -jar plantuml.jar -o ./docs/images/plantuml temp_plantuml.puml -n $(basename "$md_file" .md)_$plantuml_count
                plantuml_count++
                rm temp_plantuml.puml
              }
            }' "$md_file"
            # 处理最后一个 PlantUML 代码块
            if [ -f "temp_plantuml.puml" ]; then
              java -jar plantuml.jar -o ./docs/images/plantuml temp_plantuml.puml -n $(basename "$md_file" .md)_$plantuml_count
              rm temp_plantuml.puml
            fi
          done

      # 步骤 4：渲染 Mermaid/ZenUML 为图片（替换为稳定的 Action）
      - name: Render Mermaid (ZenUML) Diagrams
        uses: docker://minlag/mermaid-cli:latest  # 使用官方 Mermaid CLI 镜像
        with:
          args: >
            -i ./docs/**/*.md 
            -o ./docs/images/mermaid 
            -f png 
            -w 800
        env:
          PUPPETEER_CONFIG: /puppeteer-config.json

      # 步骤 5：自动提交生成的图片到仓库
      - name: Commit Rendered Images
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: auto render PlantUML/ZenUML diagrams"
          file_pattern: "docs/images/**/*"
          commit_user_name: "GitHub Actions"
          commit_user_email: "actions@github.com"
          push_options: "--force-with-lease"